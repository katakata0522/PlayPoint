<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    
    <!-- ドロップシャドウフィルタ（アプリアイコン用） -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 背景の丸グラフィック -->
  <circle cx="1020" cy="120" r="160" fill="#10b981" opacity="0.15"/>
  <circle cx="160" cy="560" r="220" fill="#60a5fa" opacity="0.12"/>
  
  <!-- テキスト情報 (位置とフォントサイズを調整して重なりを解消) -->
  <text x="80" y="240" fill="#ffffff" font-size="60" font-family="'Noto Sans JP', Arial, sans-serif" font-weight="800">
    Play Point Calculator
  </text>
  <text x="80" y="330" fill="#dbeafe" font-size="26" font-family="'Noto Sans JP', Arial, sans-serif" font-weight="600">
    次のランクまであといくら？獲得ポイントを簡単計算
  </text>
  <text x="80" y="420" fill="#a5f3fc" font-size="28" font-family="'Noto Sans JP', Arial, sans-serif" font-weight="700" letter-spacing="1">
    playpoint-sim.com
  </text>
  
  <!-- アプリアイコングループ (縮小して右端に寄せる: サイズ 256x256, X=850, Y=187) -->
  <g transform="translate(850, 187) scale(4)" filter="url(#shadow)">
    <!-- 電卓のダークグレー外枠 -->
    <rect x="14" y="10" width="36" height="44" rx="6" fill="#323e48" />
    
    <!-- 電卓内側の白いベース領域 -->
    <rect x="16" y="12" width="32" height="40" rx="4" fill="#ffffff" />
    
    <!-- 画面（青緑色） -->
    <rect x="18" y="14" width="28" height="15" rx="2.5" fill="#4db6ac" />
    
    <!-- 画面の文字「P」 -->
    <text x="32" y="25" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="13" fill="#ffffff" text-anchor="middle">P</text>
    
    <!-- ボタン群 -->
    <rect x="19" y="31.5" width="7" height="5" rx="1.5" fill="#f57c00" />
    <rect x="28.5" y="31.5" width="7" height="5" rx="1.5" fill="#fbc02d" />
    <rect x="38" y="31.5" width="7" height="5" rx="1.5" fill="#00b0ff" />
    
    <rect x="19" y="38" width="7" height="5" rx="1.5" fill="#ff5252" />
    <rect x="28.5" y="38" width="7" height="5" rx="1.5" fill="#26c6da" />
    
    <rect x="19" y="44.5" width="7" height="5" rx="1.5" fill="#00e5ff" />
    <rect x="28.5" y="44.5" width="7" height="5" rx="1.5" fill="#0288d1" />
    
    <rect x="38" y="38" width="7" height="11.5" rx="1.5" fill="#0091ea" />
    <rect x="40.5" y="43" width="2" height="1.5" fill="#ffffff" />
  </g>
</svg>

