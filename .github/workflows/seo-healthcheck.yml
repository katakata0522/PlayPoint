name: SEO Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: read

concurrency:
  group: seo-healthcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check technical SEO basics
        run: node .github/scripts/seo-health-check.cjs
