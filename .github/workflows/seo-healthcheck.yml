name: SEO Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: read

concurrency:
  group: seo-healthcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Check technical SEO basics
        run: node .github/scripts/seo-health-check.cjs
