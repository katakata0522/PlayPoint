name: Deploy to Xserver

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-playpoint-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run regression tests
        run: node tests/playpoint-regression.test.cjs

      - name: Setup SSH
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY が未設定です"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/known_hosts <<'EOF'
          [hajikkoroom.xsrv.jp]:10022 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEKKSe2ENjD1KRgSqCY7ji78s0zqCNCKBRNfRaxRV7sh
          EOF

      - name: Deploy via rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            -e "ssh -p 10022 -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ hajikkoroom@hajikkoroom.xsrv.jp:/home/hajikkoroom/playpoint-sim.com/public_html/ \
            --exclude '.git*' \
            --exclude '.github*' \
            --exclude 'README.md' \
            --exclude 'AGENTS.md' \
            --exclude 'tests*'
