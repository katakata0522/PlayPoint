name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 10022 -H hajikkoroom.xsrv.jp >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz -e "ssh -p 10022 -i ~/.ssh/id_ed25519" ./ hajikkoroom@hajikkoroom.xsrv.jp:/home/hajikkoroom/playpoint-sim.com/public_html/ --exclude '.git*' --exclude '.github*' --exclude 'README.md' --exclude 'AGENTS.md'
