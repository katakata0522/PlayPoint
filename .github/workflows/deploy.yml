name: Deploy to Xserver

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'

permissions:
  contents: read

concurrency:
  group: deploy-playpoint-main
  cancel-in-progress: true

jobs:
  deploy:
    # 本番反映はmainの内容だけを対象にする
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run regression tests
        run: |
          node .github/scripts/verify-js-syntax.cjs
          node .github/scripts/verify-build-output.cjs
          node tests/playpoint-regression.test.cjs
          node tests/playpoint-nine-fixes.test.cjs
          node tests/kindle-tracker-logic.test.cjs

      - name: Verify build outputs
        run: |
          for dir in en ko tw; do
            if [ ! -f "${dir}/index.html" ]; then
              echo "ERROR: ${dir}/index.html が生成されていません。ビルドが失敗した可能性があります。"
              exit 1
            fi
            echo "OK: ${dir}/index.html が存在します"
          done

      - name: Verify ads.txt
        run: node .github/scripts/check-ads-txt.cjs

      - name: Minify assets
        run: node .github/scripts/minify.cjs

      - name: Verify minified assets
        run: |
          node .github/scripts/verify-js-syntax.cjs
          node tests/playpoint-regression.test.cjs
          node tests/playpoint-nine-fixes.test.cjs
          node tests/kindle-tracker-logic.test.cjs

      - name: Setup SSH
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY が未設定です"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/known_hosts <<'EOF'
          [hajikkoroom.xsrv.jp]:10022 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEKKSe2ENjD1KRgSqCY7ji78s0zqCNCKBRNfRaxRV7sh
          EOF

      - name: Deploy via rsync
        run: |
          set -euo pipefail
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          until [ "$SUCCESS" = true ] || [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; do
            echo "Deploying via rsync (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)..."
            if rsync -avz --delete-after --delay-updates \
              -e "ssh -p 10022 -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o LogLevel=ERROR -o ConnectTimeout=15" \
              ./ hajikkoroom@hajikkoroom.xsrv.jp:/home/hajikkoroom/playpoint-sim.com/public_html/ \
              --exclude '.git*' \
              --exclude '.github*' \
              --exclude 'README.md' \
              --exclude 'AGENTS.md' \
              --exclude 'tests*' \
              --exclude 'docs*' \
              --exclude 'scripts*' \
              --exclude 'みんな用URL.txt' \
              --exclude 'CNAME'; then
              SUCCESS=true
              echo "Deployment succeeded!"
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ "$RETRY_COUNT" -lt "$MAX_RETRIES" ]; then
                echo "Deployment failed due to SSH or network error. Waiting 10 seconds before retrying..."
                sleep 10
              else
                echo "Deployment failed after $MAX_RETRIES attempts."
                exit 1
              fi
            fi
          done

      - name: Verify production deployment
        run: node .github/scripts/smoke-test.cjs

      - name: Verify production SEO health
        run: node .github/scripts/seo-health-check.cjs
